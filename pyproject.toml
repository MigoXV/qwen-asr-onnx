[project]
name = "qwen-asr-a733"
version = "0.1.0"
description = ""
authors = [
    {name = "wcy",email = "wcy@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["numpy==1.26.4",
"librosa",
"sox",
"tokenizers (>=0.21.4,<0.22)",
"grpcio (>=1.78.0,<2.0.0)",
"protobuf (>=6.33.5,<7.0.0)",
