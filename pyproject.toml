packages = [{include = "qwen_asr_a733", from = "src"}]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "grpcio-tools (>=1.80.0,<2.0.0)",
    "mypy-protobuf (>=5.1.0,<6.0.0)"
